name: Build

on:
    pull_request:
        branches: [master]

concurrency:
    group: build-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    npm_config_save_exact: "true"
    npm_config_engine_strict: "true"

jobs:
    ci:
        name: CI
        runs-on: ubuntu-latest
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
              with:
                  egress-policy: audit
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false
            - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version-file: .tool-versions
                  cache: npm

            # ── Quick checks (no Docker, no native deps) ─────────────────
            - run: npm ci --ignore-scripts
            - name: ESLint
              run: npm run lint
            - name: Prettier
              run: npm run format:check
            - name: npm-package-json-lint
              run: npx npm-package-json-lint .
            - name: Type coverage
              run: npx type-coverage
            - name: License check
              run: npm run license:check
            - name: npm audit
              run: npm audit --audit-level=high
            - name: Socket security scan
              if: github.event.pull_request.head.repo.full_name == github.repository
              run: npx @socketsecurity/cli@latest ci
              env:
                  SOCKET_SECURITY_API_KEY: ${{ secrets.SOCKET_API_KEY }}

            # ── Docker build + test ──────────────────────────────────────
            - name: Build CI image
              run: docker build --target ci -f Dockerfile.ci -t spire-ci .
            - name: Build production image
              run: docker build -t spire .
            - name: tsc
              run: docker run --rm -w /app spire-ci npx tsc
            - name: Vitest
              run: docker run --rm -w /app spire-ci npx vitest run
