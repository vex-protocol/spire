name: Build

on:
    pull_request:
        branches: [master]

concurrency:
    group: build-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    npm_config_save_exact: "true"
    npm_config_engine_strict: "true"

jobs:
    checks:
        name: Checks
        runs-on: ubuntu-latest
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
              with:
                  egress-policy: audit
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false
            - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version-file: .tool-versions
                  cache: npm
            - run: npm ci
            - name: ESLint
              run: npm run lint
            - name: Prettier
              run: npm run format:check
            - name: npm-package-json-lint
              run: npx npm-package-json-lint .
            - name: Type coverage
              run: npx type-coverage
            - name: License check
              run: npm run license:check
            - name: npm audit
              run: npm audit --audit-level=high
            - name: Socket security scan
              if: github.event.pull_request.head.repo.full_name == github.repository
              run: npx @socketsecurity/cli@latest ci
              env:
                  SOCKET_SECURITY_API_KEY: ${{ secrets.SOCKET_API_KEY }}
            - name: tsc
              run: npm run build
            - name: Vitest
              run: npm test

    docker:
        name: Docker
        runs-on: ubuntu-latest
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
              with:
                  egress-policy: audit
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false
            - name: Build production image
              run: docker build -t spire .
            - name: Smoke test /status
              run: |
                  docker run --rm -w /app spire node -e "
                    const nacl = require('tweetnacl');
                    const crypto = require('crypto');
                    const spk = Buffer.from(nacl.sign.keyPair().secretKey).toString('hex');
                    const jwt = crypto.randomBytes(32).toString('hex');
                    console.log('SPK=' + spk);
                    console.log('JWT_SECRET=' + jwt);
                    console.log('DB_TYPE=sqlite3mem');
                    console.log('CANARY=true');
                  " > .env
                  docker compose up -d
                  for i in $(seq 1 30); do
                    if curl -sf http://localhost:8080/status; then
                      echo ""
                      echo "Smoke test passed"
                      docker compose down
                      exit 0
                    fi
                    sleep 1
                  done
                  echo "Smoke test failed"
                  docker compose logs
                  docker compose down
                  exit 1
